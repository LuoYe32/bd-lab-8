apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: bd-lab-8
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: vault-init-sa
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://vault:8200/v1/sys/health; do
                echo "Waiting for Vault..."; sleep 3
              done
      containers:
        - name: vault-init
          image: hashicorp/vault:1.16
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              value: root
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-bootstrap-secret
                  key: QDRANT_API_KEY
          command:
            - sh
            - -c
            - |
              set -e

              echo " Enabling KV v2 secrets engine "
              vault secrets enable -version=2 kv || echo "kv already enabled"

              echo " Seeding Qdrant secrets "
              vault kv put secret/bd-lab-8/qdrant \
                api_key="${QDRANT_API_KEY}"

              echo " Enabling Kubernetes auth method "
              vault auth enable kubernetes || echo "kubernetes auth already enabled"

              echo " Configuring Kubernetes auth "
              # Vault uses the pod's own SA token and CA cert automatically
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc"

              echo " Creating policy "
              vault policy write bd-lab-8 - <<'EOF'
              path "secret/data/bd-lab-8/*" {
                capabilities = ["read", "list"]
              }
              EOF

              echo " Creating role for vault-sync-sa "
              vault write auth/kubernetes/role/secret-sync \
                bound_service_account_names=vault-sync-sa \
                bound_service_account_namespaces=bd-lab-8 \
                policies=bd-lab-8 \
                ttl=1h

              echo " Vault initialization complete "
