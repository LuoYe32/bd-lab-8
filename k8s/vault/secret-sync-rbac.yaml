apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-sync-sa
  namespace: bd-lab-8
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-sync-role
  namespace: bd-lab-8
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-sync-rolebinding
  namespace: bd-lab-8
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-sync-role
subjects:
  - kind: ServiceAccount
    name: vault-sync-sa
    namespace: bd-lab-8
