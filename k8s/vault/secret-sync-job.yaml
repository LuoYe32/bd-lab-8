apiVersion: batch/v1
kind: Job
metadata:
  name: vault-secret-sync
  namespace: bd-lab-8
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: vault-sync-sa
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://vault:8200/v1/sys/health; do
                echo "Waiting for Vault..."; sleep 3
              done
        - name: fetch-from-vault
          image: hashicorp/vault:1.16
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
          command:
            - sh
            - -c
            - |
              set -e
              echo " Authenticating with Vault "
              JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=secret-sync jwt="$JWT")
              export VAULT_TOKEN

              echo " Fetching secret "
              vault kv get -field=api_key secret/bd-lab-8/qdrant > /vault-secrets/QDRANT_API_KEY
              echo "Secret fetched successfully."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
      containers:
        - name: apply-secret
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              set -e
              QDRANT_API_KEY=$(cat /vault-secrets/QDRANT_API_KEY)
              echo " Creating/updating k8s Secret "
              kubectl create secret generic qdrant-secret \
                --from-literal=QDRANT_API_KEY="$QDRANT_API_KEY" \
                --namespace=bd-lab-8 \
                --dry-run=client -o yaml | kubectl apply -f -
              echo " qdrant-secret synced successfully "
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
      volumes:
        - name: vault-secrets
          emptyDir: {}
