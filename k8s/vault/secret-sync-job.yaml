apiVersion: batch/v1
kind: Job
metadata:
  name: vault-secret-sync
  namespace: bd-lab-8
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: vault-sync-sa
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: hashicorp/vault:1.16
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://vault:8200/v1/sys/health; do
                echo "Waiting for Vault..."; sleep 3
              done
        - name: fetch-from-vault
          image: hashicorp/vault:1.16
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
          command:
            - sh
            - -c
            - |
              set -e
              echo " Authenticating with Vault "
              JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=secret-sync jwt="$JWT")
              export VAULT_TOKEN

              echo " Fetching secret "
              vault kv get -field=api_key secret/bd-lab-8/qdrant > /vault-secrets/QDRANT_API_KEY
              echo "Secret fetched successfully."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
      containers:
        - name: apply-secret
          image: hashicorp/vault:1.16
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl >/dev/null 2>&1
              QDRANT_API_KEY=$(cat /vault-secrets/QDRANT_API_KEY)
              echo " Creating/updating k8s Secret via Kubernetes API "

              K8S_HOST="https://kubernetes.default.svc"
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              NS="bd-lab-8"

              ENCODED=$(echo -n "$QDRANT_API_KEY" | base64 | tr -d '\n')

              curl -s -k -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                "$K8S_HOST/api/v1/namespaces/$NS/secrets/qdrant-secret" || true

              curl -s -k -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"qdrant-secret\",\"namespace\":\"$NS\"},\"data\":{\"QDRANT_API_KEY\":\"$ENCODED\"}}" \
                "$K8S_HOST/api/v1/namespaces/$NS/secrets"

              echo " qdrant-secret synced successfully "
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
      volumes:
        - name: vault-secrets
          emptyDir: {}
