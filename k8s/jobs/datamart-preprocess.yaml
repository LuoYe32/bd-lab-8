apiVersion: batch/v1
kind: Job
metadata:
  name: datamart-preprocess
  namespace: bd-lab-8
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: spark-sa
      restartPolicy: Never
      containers:
        - name: datamart
          image: bd-lab-8/datamart:latest
          imagePullPolicy: Never
          args: ["preprocess"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: qdrant-secret
          volumeMounts:
            - name: processed-data
              mountPath: /data/processed
          resources:
            requests:
              memory: "300Mi"
              cpu: "500m"
            limits:
              memory: "400Mi"
              cpu: "1"
      volumes:
        - name: processed-data
          persistentVolumeClaim:
            claimName: processed-data-pvc
